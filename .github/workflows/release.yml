name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  # Full checks gate the release: a broken tag is never shipped.
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race ./...

      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  # Verify the cgo-free static build and tests on the other target OSes. Audio
  # output is platform-specific (oto on macOS/Windows, PulseAudio on Linux), so
  # building on real runners catches cross-OS breakage early.
  cross-build:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      CGO_ENABLED: 0
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...

  release:
    needs: [checks, cross-build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Prepare release notes
        run: bash scripts/changelog-notes.sh "${GITHUB_REF_NAME}"

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --parallelism 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          SCOOP_WINGET_TOKEN: ${{ secrets.SCOOP_WINGET_TOKEN }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

      # Publish the Homebrew formula to both taps from dist/checksums.txt.
      # Runs even if a late goreleaser pipe (winget/snap) failed, so an
      # unrelated publisher error never blocks Homebrew. A cancelled run still
      # stops here.
      - name: Update Homebrew formula
        if: ${{ !cancelled() }}
        run: bash scripts/update-formula.sh "${GITHUB_REF_NAME}"
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # Upload deb/rpm to Gemfury (stable tags only; the script self-skips
      # betas). Same rationale as above: independent of the winget/snap pipes.
      - name: Publish to Gemfury
        if: ${{ !cancelled() }}
        run: bash scripts/update-fury.sh "${GITHUB_REF_NAME}"
        env:
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}
