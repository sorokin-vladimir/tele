version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/tele/
    binary: tele
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.buildAPIID={{ .Env.TG_API_ID }}
      - -X main.buildAPIHash={{ .Env.TG_API_HASH }}
      - -X main.version={{ .Version }}

archives:
  - id: tarballs
    formats: [tar.gz]
    # Windows users get a .zip (with tele.exe) instead of a tarball.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "tele_{{ .Os }}_{{ .Arch }}"
    files:
      - config.yml.example
  - id: binaries
    # Raw downloadable binary per OS/arch; Windows gets tele-windows-amd64.exe.
    formats: [binary]
    name_template: "tele-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  # Primary, canonical tap. Install via: brew tap sorokin-vladimir/tap
  - name: tele
    ids:
      - tarballs
    repository:
      owner: sorokin-vladimir
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sorokin-vladimir/tele"
    description: "TUI Telegram client"
    install: |
      bin.install "tele"
    test: |
      system "#{bin}/tele", "--version"

  # Deprecated tap, kept in sync for now so `brew upgrade tele` keeps working
  # for existing users. The caveats print a migration notice on every install.
  - name: tele
    ids:
      - tarballs
    repository:
      owner: sorokin-vladimir
      name: homebrew-tele
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sorokin-vladimir/tele"
    description: "TUI Telegram client (deprecated tap — use sorokin-vladimir/tap)"
    caveats: |
      This tap is deprecated. Please migrate to the unified tap:
        brew untap sorokin-vladimir/tele
        brew tap sorokin-vladimir/tap
    install: |
      bin.install "tele"
    test: |
      system "#{bin}/tele", "--version"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug fixes
      regexp: '^fix'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore'
      - '^docs'
      - '^test'
      - '^Merge '

release:
  name_template: "{{ .Env.RELEASE_NAME }}"
  header: |
    {{ .Env.RELEASE_HEADER }}
