version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/tele/
    binary: tele
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.buildAPIID={{ .Env.TG_API_ID }}
      - -X main.buildAPIHash={{ .Env.TG_API_HASH }}
      - -X main.version={{ .Version }}

archives:
  - id: tarballs
    formats: [tar.gz]
    # Windows users get a .zip (with tele.exe) instead of a tarball.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "tele_{{ .Os }}_{{ .Arch }}"
    files:
      - config.yml.example
  - id: binaries
    # Raw downloadable binary per OS/arch; Windows gets tele-windows-amd64.exe.
    formats: [binary]
    name_template: "tele-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Homebrew formulae are published by scripts/update-formula.sh in the release
# workflow (the `brews` publisher is deprecated and Casks would drop Linux).

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug fixes
      regexp: '^fix'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore'
      - '^docs'
      - '^test'
      - '^Merge '

release:
  name_template: "{{ .Env.RELEASE_NAME }}"
  header: |
    {{ .Env.RELEASE_HEADER }}
