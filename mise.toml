[tools]
go = "1.26.0"

[tasks.dev]
description = "Run tele (dev config: .config/tele/config.yml)"
run = "go run ./cmd/tele/ -config .config/tele/config.yml"

[tasks.dev-e]
description = "Run tele with debug logging"
run = "go run ./cmd/tele/ -config .config/tele/config.yml -e"

[tasks.build]
description = "Build binary"
run = "go build -o ./bin/tele ./cmd/tele/"

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.test-v]
description = "Run all tests verbose"
run = "go test -v ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.check]
description = "Full check: vet + lint + test"
run = ["go vet ./...", "golangci-lint run ./...", "go test ./..."]

[tasks.tidy]
description = "Tidy go modules"
run = "go mod tidy"

[tasks.hooks]
description = "Install git hooks via lefthook"
run = "lefthook install"

[tasks.release]
description = "Cut a release: promote CHANGELOG, commit, tag (no push). Usage: mise run release <version|patch|minor|major>"
run = "bash scripts/release.sh"
