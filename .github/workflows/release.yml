name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Full checks gate the release: a broken tag is never shipped.
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race ./...

      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  # Verify the cgo-free static build and tests on the other target OSes. Audio
  # output is platform-specific (oto on macOS/Windows, PulseAudio on Linux), so
  # building on real runners catches cross-OS breakage early.
  cross-build:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      CGO_ENABLED: 0
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...

  release:
    needs: [checks, cross-build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare release notes
        run: bash scripts/changelog-notes.sh "${GITHUB_REF_NAME}"

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --parallelism 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}

      # Publish the Homebrew formula to both taps from dist/checksums.txt.
      - name: Update Homebrew formula
        run: bash scripts/update-formula.sh "${GITHUB_REF_NAME}"
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
