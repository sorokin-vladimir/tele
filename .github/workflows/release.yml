name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  # Full checks gate the release: a broken tag is never shipped.
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race ./...

      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  # Verify the cgo-free static build and tests on the other target OSes. Audio
  # output is platform-specific (oto on macOS/Windows, PulseAudio on Linux), so
  # building on real runners catches cross-OS breakage early.
  cross-build:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      CGO_ENABLED: 0
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...

  release:
    needs: [checks, cross-build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Prepare release notes
        run: bash scripts/changelog-notes.sh "${GITHUB_REF_NAME}"

      # Install the goreleaser binary only; run it in a separate step so its
      # output can be tee'd to a log the summary step parses.
      - name: Install goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true

      # continue-on-error so a late publisher failure (winget/snap) does not
      # abort the job before Homebrew/Gemfury, the summary, and the gate run.
      # GitHub's bash shell runs with pipefail, so the step still reflects
      # goreleaser's exit code via steps.goreleaser.outcome.
      - name: Run goreleaser
        id: goreleaser
        continue-on-error: true
        run: goreleaser release --clean --parallelism 1 2>&1 | tee goreleaser.log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          SCOOP_WINGET_TOKEN: ${{ secrets.SCOOP_WINGET_TOKEN }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

      # Publish the Homebrew formula to both taps from dist/checksums.txt.
      # Independent of the winget/snap pipes; continue-on-error so the gate is
      # the single red/green decision point.
      - name: Update Homebrew formula
        id: homebrew
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: bash scripts/update-formula.sh "${GITHUB_REF_NAME}"
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # Upload deb/rpm to Gemfury (stable tags only; the script self-skips betas).
      - name: Publish to Gemfury
        id: gemfury
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: bash scripts/update-fury.sh "${GITHUB_REF_NAME}"
        env:
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}

      # Render release notes + a per-target publish status table to the job
      # summary. Never fails the job; emits any_failed for the gate.
      - name: Release summary
        id: summary
        if: ${{ !cancelled() }}
        run: bash scripts/release-summary.sh
        env:
          LOG_FILE: goreleaser.log
          GORELEASER_OUTCOME: ${{ steps.goreleaser.outcome }}
          HOMEBREW_OUTCOME: ${{ steps.homebrew.outcome }}
          GEMFURY_OUTCOME: ${{ steps.gemfury.outcome }}

      # Single red/green gate: fail the job if any target had a problem.
      - name: Release gate
        if: ${{ !cancelled() }}
        run: |
          if [ "${{ steps.summary.outputs.any_failed }}" = "1" ]; then
            echo "One or more release targets failed; see the job summary." >&2
            exit 1
          fi
